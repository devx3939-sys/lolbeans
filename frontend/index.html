/* index.html - Main entry point */
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOLBEANS - Multiplayer Obstacle Course</title>
    <meta name="description" content="🫘 LOLBEANS - A chaotic, fun browser-based multiplayer party game. Race with friends in obstacle courses up to 12 players online." />
    <meta name="theme-color" content="#667eea" />
    
    <!-- Open Graph for sharing -->
    <meta property="og:title" content="LOLBEANS - Multiplayer Party Game" />
    <meta property="og:description" content="Play an online obstacle course party game with up to 12 friends!" />
    <meta property="og:type" content="game" />
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      
      #root {
        width: 100%;
        height: 100vh;
      }
      
      /* Loading screen */
      .loading {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
      }
      
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-right: 15px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        Loading LOLBEANS...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
